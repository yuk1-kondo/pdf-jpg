name: Build Windows Artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Build app executable (.NET)
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File scripts/build_windows_dotnet.ps1

      - name: Build installer
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File scripts/make_installer.ps1

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeonPDFShot-app
          path: dist-dotnet/NeonPDFShot

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeonPDFShot-installer
          path: dist-installer/*.exe
